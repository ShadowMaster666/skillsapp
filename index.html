<title>SkillsApp</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;touch-action:manipulation}
:root{
  --bg:#0C0C0E;--surf:#161618;--card:#1C1C1F;--border:#2C2C30;
  --text:#F5F5F7;--sub:#8E8E93;--dim:#3A3A3E;
  --lime:#C8FF00;--orange:#FF9F0A;--blue:#0A84FF;--red:#FF453A;
  --purple:#BF5AF2;--green:#32D74B;--pink:#FF6B81;
}
html,body{background:var(--bg);color:var(--text);font-family:-apple-system,BlinkMacSystemFont,sans-serif;min-height:100%;height:100%}
#app{max-width:430px;margin:0 auto;min-height:100vh;height:100vh;display:flex;flex-direction:column;position:relative}
.screen{flex:1;overflow-y:auto;overflow-x:hidden;padding-bottom:88px;-webkit-overflow-scrolling:touch}
button{cursor:pointer;font-family:inherit;-webkit-appearance:none;border:none}
input{font-family:inherit}
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
/* Auth */
#auth-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;padding:36px 28px;background:var(--bg)}
.auth-title{font-size:30px;font-weight:800;letter-spacing:-0.5px;margin-bottom:8px;text-align:center}
.auth-sub{color:var(--sub);font-size:14px;text-align:center;margin-bottom:40px;line-height:1.6;max-width:280px}
.auth-btn{width:100%;max-width:340px;padding:14px 20px;border-radius:16px;border:1px solid var(--border)!important;background:var(--surf);color:var(--text);font-size:15px;font-weight:600;display:flex;align-items:center;gap:14px;margin-bottom:12px;cursor:pointer}
.auth-btn:active{background:var(--card)}
.auth-btn svg{width:22px;height:22px;flex-shrink:0}
.auth-divider{color:var(--dim);font-size:11px;margin:8px 0 20px;letter-spacing:2px}
.auth-guest{background:transparent!important;color:var(--sub);font-size:13px;margin-top:16px;text-decoration:underline;padding:4px}
/* Nav */
#nav{position:fixed;bottom:0;left:0;right:0;width:100%;max-width:430px;margin:0 auto;background:var(--surf);border-top:1px solid var(--border);display:flex;padding:10px 0 max(10px,env(safe-area-inset-bottom,10px));z-index:9999;-webkit-transform:translateZ(0)}
.nav-btn{flex:1;background:transparent;display:flex;flex-direction:column;align-items:center;gap:4px;padding:2px 0}
.nav-icon{color:var(--dim);transition:color .15s}
.nav-label{font-size:10px;color:var(--dim);font-weight:400;transition:color .15s}
.nav-btn.active .nav-icon,.nav-btn.active .nav-label{color:var(--lime)}
.nav-btn.active .nav-label{font-weight:700}
/* Page headers */
.page-hdr{padding:52px 20px 20px}
.eyebrow{color:var(--sub);font-size:11px;letter-spacing:3px;font-weight:600;margin-bottom:6px}
.page-title{color:var(--text);font-size:30px;font-weight:800;letter-spacing:-.5px}
/* Skill grid */
.skill-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;padding:0 16px 24px}
.skill-card{background:var(--card);border-radius:22px;border:1px solid var(--border);overflow:hidden;cursor:pointer;transition:transform .12s}
.skill-card:active{transform:scale(0.96)}
.skill-bar{height:3px}
.skill-art{display:flex;align-items:center;justify-content:center;padding:10px 8px 6px;min-height:78px}
.skill-art img{width:90px;height:68px;object-fit:contain;border-radius:8px}
.skill-body{padding:8px 14px 14px}
.skill-name{font-size:14px;font-weight:700;margin-bottom:2px}
.skill-meta{color:var(--sub);font-size:11px}
.logged-tag{margin-top:8px;border-radius:8px;padding:3px 8px;display:inline-block;font-size:10px;font-weight:700}
/* Progression cards */
.prog-card{border-radius:16px;border:1px solid var(--border);margin-bottom:8px;overflow:hidden;cursor:pointer;background:var(--surf)}
.prog-inner{display:flex;align-items:stretch}
.prog-accent{width:4px;flex-shrink:0}
.prog-num{width:32px;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:800;color:var(--sub);flex-shrink:0}
.prog-art{width:90px;height:70px;flex-shrink:0;background:#252528;display:flex;align-items:center;justify-content:center;overflow:hidden}
.prog-art img{width:86px;height:66px;object-fit:contain;border-radius:4px}
.prog-info{flex:1;padding:10px 12px}
.badge{display:inline-flex;padding:2px 7px;border-radius:6px;font-size:9px;font-weight:800;letter-spacing:.8px;margin-bottom:4px}
.b-beginner{background:#2ED57322;color:#2ED573}
.b-bplus{background:#32D74B22;color:#32D74B}
.b-intermediate{background:#FF9F0A22;color:#FF9F0A}
.b-iplus{background:#FFB83F22;color:#FFB83F}
.b-advanced{background:#FF453A22;color:#FF453A}
.b-aplus{background:#FF6B5B22;color:#FF6B5B}
.b-elite{background:#0A84FF22;color:#0A84FF}
.b-eplus{background:#5AC8FA22;color:#5AC8FA}
.prog-name{font-size:13px;font-weight:700;color:var(--text);margin-bottom:3px}
.prog-desc{font-size:11px;color:var(--sub);line-height:1.45}
.prog-target{font-size:10px;color:var(--dim);margin-top:3px}
.prog-pb{padding:0 12px;display:flex;flex-direction:column;align-items:flex-end;justify-content:center;flex-shrink:0}
.prog-tip{display:none;padding:10px 14px 12px;border-top:1px solid var(--border);color:var(--sub);font-size:12px;line-height:1.65}
/* Routine cards */
.routine-card{background:var(--card);border-radius:20px;border:1px solid var(--border);padding:18px;margin-bottom:14px}
.btn-lime{background:var(--lime);color:#000;border:none;border-radius:14px;padding:13px 20px;font-weight:800;font-size:15px;display:flex;align-items:center;justify-content:center;gap:8px;width:100%}
.btn-lime:active{opacity:.85}
.btn-ghost{background:transparent;border:1px solid var(--border)!important;border-radius:12px;padding:8px 14px;color:var(--sub);font-size:12px;font-weight:600}
.icon-btn-r{background:rgba(255,255,255,.07);border:none;border-radius:10px;width:34px;height:34px;display:flex;align-items:center;justify-content:center}
.icon-btn-del{background:rgba(255,69,58,.1);border:none;border-radius:10px;width:34px;height:34px;display:flex;align-items:center;justify-content:center}
/* Build */
.tab-bar{display:flex;background:var(--card);border-radius:12px;padding:3px}
.tab-btn{flex:1;padding:8px;border:none;border-radius:10px;font-weight:700;font-size:12px;cursor:pointer;transition:all .18s;background:transparent;color:var(--sub)}
.tab-btn.active{background:var(--lime);color:#000}
.skill-pill{padding:6px 14px;border-radius:20px;border:1.5px solid var(--border)!important;background:transparent;color:var(--sub);font-size:11px;font-weight:600;cursor:pointer;white-space:nowrap}
.field-box{flex:1;background:var(--card);border-radius:12px;padding:10px 14px}
.field-label{color:var(--sub);font-size:9px;letter-spacing:1.5px;margin-bottom:6px}
.field-input{width:100%;background:transparent;border:none;outline:none;color:var(--text);font-size:22px;font-weight:800}
/* Workout */
.wo-art{width:120px;height:110px;background:var(--surf);border-radius:28px;display:flex;align-items:center;justify-content:center;margin-bottom:16px}
.wo-art img{width:100px;height:92px;object-fit:contain;border-radius:12px}
.set-dot{width:42px;height:42px;border-radius:12px;background:var(--surf);border:1.5px solid var(--border);display:flex;align-items:center;justify-content:center;transition:all .3s}
.timer-big{font-size:76px;font-weight:900;font-family:monospace;letter-spacing:-2px;line-height:1}
.timer-track{height:4px;border-radius:2px;background:var(--border);overflow:hidden;width:100%;margin-bottom:8px}
.timer-fill{height:100%;border-radius:2px;transition:width .8s linear}
.edit-box{width:100%;border-radius:20px;padding:20px;margin-bottom:14px;text-align:center;border:1px solid var(--border);background:var(--card)}
.edit-pm{width:44px;height:44px;border-radius:12px;background:var(--surf);border:1px solid var(--border)!important;color:var(--text);font-size:24px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.edit-input{width:90px;text-align:center;background:transparent;border:none;outline:none;font-size:48px;font-weight:900;font-family:monospace}
.stop-btn{width:100%;border-radius:18px;padding:16px;font-weight:900;font-size:17px;cursor:pointer;border:2px solid!important}
/* Progress */
.stat-card{background:var(--card);border-radius:16px;border:1px solid var(--border);padding:14px 12px;text-align:center}
.pb-row{background:var(--surf);border:1px solid var(--border);border-radius:12px;padding:12px 14px;margin-bottom:6px;display:flex;justify-content:space-between;align-items:center}
.hist-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:14px 16px;margin-bottom:10px}
.user-bar{display:flex;align-items:center;gap:12px;padding:14px 16px;background:var(--surf);border-radius:16px;border:1px solid var(--border);margin-bottom:20px}
.avatar{width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:18px;color:#000;flex-shrink:0}
/* Back btn */
.back-btn{background:rgba(255,255,255,.07)!important;border:none;border-radius:12px;width:38px;height:38px;display:flex;align-items:center;justify-content:center;margin-bottom:16px;flex-shrink:0;cursor:pointer}
.fade-in{animation:fi .18s ease}
@keyframes fi{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}
</style>
</head>

function buildWorkout(routine){

  let timerIv,restIv,elapsedIv,results=[];
  let editV='';
  const startMs=Date.now();
  elapsedIv=setInterval(()=>{elapsed=Math.floor((Date.now()-startMs)/1000);const ep=$('ep');if(ep)ep.textContent=fmtT(elapsed)},1000);

  function clearAll(){clearInterval(timerIv);clearInterval(restIv);clearInterval(elapsedIv)}
  function startRest(dur){restV=dur;restIv=setInterval(()=>{restV--;const rn=$('rn');if(rn)rn.textContent=restV;if(restV<=0){clearInterval(restIv);phase='ready';render()}},1000)}

    else{clearAll();const dur=Math.max(1,Math.round((Date.now()-startMs)/60000));S.history.push({routineName:routine.name,date:new Date().toLocaleDateString('en-GB'),duration:dur,results});save();showTab('progress')}

      const einp=el('input',{id:'ei',type:'number',class:'edit-input',value:editV,style:{color:ex.skillColor}});einp.addEventListener('input',e=>editV=e.target.value);

    const s=$('sc');if(!s)return;s.innerHTML='';
    if(activeSub==='scoreboard'){
      if(!Object.keys(S.bests).length){s.appendChild(el('div',{style:{textAlign:'center',padding:'40px 0',color:'var(--dim)',fontSize:'14px'}},'Complete workouts to set personal bests'));return}
      SKILLS.forEach(sk=>{
        const rows=sk.progs.filter(p=>S.bests[p.id]);if(!rows.length)return;
        const sec=el('div',{style:{marginBottom:'16px'}});
        sec.appendChild(el('div',{style:{color:sk.color,fontSize:'12px',fontWeight:'700',letterSpacing:'.5px',marginBottom:'8px'}},sk.name.toUpperCase()));
        rows.forEach(p=>{
          const row=el('div',{class:'pb-row'});
          const at=el('div',{style:{width:'44px',height:'36px',background:'#252528',borderRadius:'8px',display:'flex',alignItems:'center',justifyContent:'center',marginRight:'10px',flexShrink:'0',overflow:'hidden'}});
          const imgSrc=getImg(p.id);
          if(imgSrc){const im=imgEl(imgSrc);im.style.cssText='width:40px;height:32px;object-fit:contain;border-radius:6px';at.appendChild(im)}
          const ri=el('div',{style:{display:'flex',alignItems:'center',flex:'1'}});ri.append(at,el('span',{style:{fontSize:'13px',fontWeight:'500'}},p.name));
          const pbd=el('div',{style:{background:`color-mix(in srgb,${sk.color} 20%,transparent)`,borderRadius:'10px',padding:'4px 12px'}});
          pbd.innerHTML=`<span style="color:${sk.color};font-size:14px;font-weight:900">${S.bests[p.id]}${p.u==='s'?'s':''}</span>`;
          row.append(ri,pbd);sec.appendChild(row);
        });
        s.appendChild(sec);
      });
    } else {
      if(!S.history.length){s.appendChild(el('div',{style:{color:'var(--dim)',fontSize:'14px',textAlign:'center',padding:'40px 0'}},'No sessions yet'));return}
      [...S.history].reverse().forEach(h=>{
        const card=el('div',{class:'hist-card'});
        const row=el('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:'10px'}});
        row.append(el('div',{},el('div',{style:{fontSize:'15px',fontWeight:'700'}},h.routineName),el('div',{style:{color:'var(--sub)',fontSize:'11px',marginTop:'2px'}},h.date)));
        const dur=el('div',{style:{background:'color-mix(in srgb,var(--lime) 18%,transparent)',borderRadius:'10px',padding:'4px 12px'}});
        dur.innerHTML=`<span style="color:var(--lime);font-size:13px;font-weight:800">${h.duration}min</span>`;
        row.appendChild(dur);card.appendChild(row);
        if(h.results?.length){const tags=el('div',{style:{display:'flex',flexWrap:'wrap',gap:'5px'}});[...new Map(h.results.map(r=>[r.exId,r])).values()].forEach(r=>{const t=el('span',{style:{background:`color-mix(in srgb,${r.skillColor} 15%,transparent)`,border:`1px solid color-mix(in srgb,${r.skillColor} 30%,transparent)`,borderRadius:'8px',padding:'3px 9px',fontSize:'10px',color:r.skillColor,fontWeight:'600'}});t.textContent=`${r.exName}: ${r.value}${r.unit==='s'?'s':''}`;tags.appendChild(t)});card.appendChild(tags)}
        s.appendChild(card);
      });
    }
  }
  rs();return w;
}

/* ─── BOOT ──────────────────────────────────────────────────── */
document.addEventListener('DOMContentLoaded',()=>{
  // Load Google Identity Services for real auth
  const gsi=document.createElement('script');
  gsi.src='https://accounts.google.com/gsi/client';
  gsi.async=true; gsi.defer=true;
  gsi.onload=()=>{
    window._gsiReady=true;
    if(window.google&&google.accounts){
      google.accounts.id.initialize({
        client_id:'YOUR_GOOGLE_CLIENT_ID',
        callback:(resp)=>{
          if(S.user&&S.user.provider==='google')return; // already logged in
          const payload=JSON.parse(atob(resp.credential.split('.')[1]));
          S.user={name:payload.name,email:payload.email,provider:'google',avatar:(payload.name||'G')[0].toUpperCase(),bg:'var(--blue)',googleToken:resp.credential};
          if(!S.routines.length)S.routines=JSON.parse(JSON.stringify(DEF));
          save();renderMain();
        },
        auto_select:true
      });
      // Only auto-prompt if not already logged in
      if(!S.user) google.accounts.id.prompt();
    }
  };
  document.head.appendChild(gsi);
  load();
  if(S.user){if(!S.routines.length)S.routines=JSON.parse(JSON.stringify(DEF));renderMain()}
  else{app().appendChild(renderAuth())}
});
</script>
